apiVersion: batch/v1
kind: CronJob
metadata:
  name: ai-agent-security-eval-evals
  labels:
    app: ai-agent-security-eval
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: ai-agent-security-eval-evals
        spec:
          restartPolicy: OnFailure
          containers:
            - name: eval-runner
              image: ai-agent-security-eval:local
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "scripts.run_evals"]
              envFrom:
                - configMapRef:
                    name: ai-agent-security-eval-config
              env:
                - name: OPTIONAL_LLM_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ai-agent-security-eval-secrets
                      key: OPTIONAL_LLM_API_KEY
                      optional: true
              volumeMounts:
                - name: app-data
                  mountPath: /app/data
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 300m
                  memory: 256Mi
          volumes:
            - name: app-data
              emptyDir: {}

