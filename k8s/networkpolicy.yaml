apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-agent-security-eval
spec:
  podSelector:
    matchLabels:
      app: ai-agent-security-eval
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
